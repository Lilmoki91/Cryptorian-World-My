<script>
// ======================= TICKER REAL-TIME COINGECKO =======================
const COINS_CONFIG = [
    { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin' },
    { id: 'ethereum', symbol: 'ETH', name: 'Ethereum' },
    { id: 'ripple', symbol: 'XRP', name: 'Ripple' },
    { id: 'solana', symbol: 'SOL', name: 'Solana' },
    { id: 'tether', symbol: 'USDT', name: 'Tether' },
    { id: 'worldcoin-wld', symbol: 'WLD', name: 'Worldcoin' }
];

let tickerPrices = {};
let tickerChanges = {};

async function fetchTickerPrices() {
    try {
        const ids = COINS_CONFIG.map(c => c.id).join(',');
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=myr&include_24hr_change=true`;
        const response = await fetch(url);
        const data = await response.json();
        
        COINS_CONFIG.forEach(coin => {
            if (data[coin.id]) {
                tickerPrices[coin.symbol] = data[coin.id].myr;
                tickerChanges[coin.symbol] = data[coin.id].myr_24h_change;
            }
        });
        updateTicker();
    } catch (error) {
        console.error('Ticker fetch error:', error);
    }
}

function updateTicker() {
    const tickerEl = document.getElementById('ticker');
    if (!tickerEl) return;
    let html = '';
    COINS_CONFIG.forEach(coin => {
        const price = tickerPrices[coin.symbol];
        const change = tickerChanges[coin.symbol];
        if (price == null) return;
        
        const isPositive = change >= 0;
        const changeText = (isPositive ? '+' : '') + (change?.toFixed(2) ?? '0.00') + '%';
        const arrow = isPositive ? '▲' : '▼';
        const formattedPrice = coin.symbol === 'BTC' || coin.symbol === 'ETH' ? 
            price.toLocaleString('ms-MY', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) :
            price.toFixed(2);
        
        let iconHtml = '';
        if (coin.symbol === 'BTC') iconHtml = '<i class="fab fa-bitcoin" style="font-size:13px; margin-right:4px; color:#f7931a;"></i>';
        else if (coin.symbol === 'ETH') iconHtml = '<i class="fab fa-ethereum" style="font-size:13px; margin-right:4px; color:#627eea;"></i>';
        else if (coin.symbol === 'SOL') iconHtml = '<span style="font-size:14px; margin-right:4px; color:#9945FF; font-weight:bold;">Ⓢ</span>';
        else if (coin.symbol === 'XRP') iconHtml = '<i class="fas fa-times" style="font-size:13px; margin-right:4px; color:#8a929c;"></i>';
        else if (coin.symbol === 'USDT') iconHtml = '<span style="font-size:14px; margin-right:4px; color:#00ffb9; font-weight:bold;">₮</span>';
        else if (coin.symbol === 'WLD') iconHtml = '<i class="fas fa-earth-americas" style="font-size:13px; margin-right:4px; color:silver;"></i>';
        
        html += `<span class="ticker-item">
                    ${iconHtml}<span class="ticker-symbol">${coin.symbol}</span>
                    <span class="ticker-price"> RM ${formattedPrice}</span>
                    <span class="ticker-change ${isPositive ? 'positive' : 'negative'}"> ${arrow} ${changeText}</span>
                </span>`;
    });
    // Duplicate untuk loop tanpa henti
    tickerEl.innerHTML = html + html;
}

// Initial fetch dan auto refresh setiap 30 saat

    function getMalaysiaTime() {
        const now = new Date();
        const options = {
            timeZone: 'Asia/Kuala_Lumpur',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        };
        const formatter = new Intl.DateTimeFormat('ms-MY', options);
        return `Kemaskini: ${formatter.format(now)}`;
    }

    function getRelativeDateMs(pubDate) {
        const now = new Date();
        const malayNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
        const pub = new Date(pubDate);
        const diffMs = malayNow - pub;
        if (isNaN(diffMs) || diffMs < 0) return 'baru sahaja';
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin < 1) return 'baru sahaja';
        if (diffMin < 60) return `${diffMin} minit lepas`;
        const diffHr = Math.floor(diffMin / 60);
        if (diffHr < 24) return `${diffHr} jam lepas`;
        const diffDay = Math.floor(diffHr / 24);
        if (diffDay === 1) return 'semalam';
        if (diffDay < 7) return `${diffDay} hari lepas`;
        if (diffDay < 30) return `${Math.floor(diffDay / 7)} minggu lepas`;
        return `${Math.floor(diffDay / 30)} bulan lepas`;
    }

    function detectCoin(text) {
        const upper = text.toUpperCase();
        for (const kw of COIN_KEYWORDS) {
            if (upper.includes(kw.toUpperCase())) {
                return COIN_MAP[kw];
            }
        }
        return null;
    }

    function isValidNews(text) {
        if (!text) return false;
        const upper = text.toUpperCase();
        for (const kw of COIN_KEYWORDS) {
            if (upper.includes(kw.toUpperCase())) return true;
        }
        return false;
    }

    function decodeHtmlEntity(str) {
        const txt = document.createElement('textarea');
        txt.innerHTML = str;
        return txt.value;
    }

    function parseRSS(xmlText) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
        const items = xmlDoc.querySelectorAll('item');
        const newsList = [];
        items.forEach(item => {
            const title = item.querySelector('title') ? decodeHtmlEntity(item.querySelector('title').textContent) : '';
            const source = item.querySelector('source') ? item.querySelector('source').textContent : 'Tidak diketahui';
            const link = item.querySelector('link') ? item.querySelector('link').textContent : '#';
            const pubDate = item.querySelector('pubDate') ? item.querySelector('pubDate').textContent : '';
            const description = item.querySelector('description') ? decodeHtmlEntity(item.querySelector('description').textContent) : '';
            const fullText = title + ' ' + description;
            if (!isValidNews(fullText)) return;
            const coin = detectCoin(fullText);
            const relativeDate = pubDate ? getRelativeDateMs(pubDate) : 'baru sahaja';
            newsList.push({ title, source, link, date: relativeDate, coin: coin || 'CRYPTO' });
        });
        return newsList;
    }

    function showSkeleton() {
        const container = document.getElementById('newsContainer');
        let html = '<div class="loading-skeleton">';
        for (let i = 0; i < 4; i++) {
            html += `<div class="skeleton-card">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
    }

    function renderNews(newsArray) {
        const container = document.getElementById('newsContainer');
        if (newsArray.length === 0) {
            container.innerHTML = `<div class="fallback-msg">Tiada berita berkaitan krypto ditemui.<div class="sub">Sila cuba muat semula.</div></div>`;
            return;
        }
        const limited = newsArray.slice(0, MAX_NEWS);
        let html = '<div class="news-grid">';
        limited.forEach((news, idx) => {
            html += `<a class="news-card" href="${news.link}" target="_blank" rel="noopener noreferrer" style="animation-delay: ${idx * 0.07}s">
                        <span class="news-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
                        <span class="coin-badge">${news.coin}</span>
                        <div class="news-title">${news.title}</div>
                        <div class="news-meta"><span class="news-source">${news.source}</span><span class="news-date">• ${news.date}</span></div>
                    </a>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function renderFallback() {
        const container = document.getElementById('newsContainer');
        let html = `<div class="fallback-msg" style="margin-bottom:16px;">⚠️ Gagal memuat berita. Cuba lagi.<div class="sub">Menunjukkan data contoh sementara.</div></div><div class="news-grid">`;
        FALLBACK_NEWS.forEach((news, idx) => {
            html += `<a class="news-card" href="${news.link}" target="_blank" style="animation-delay: ${idx * 0.07}s">
                        <span class="news-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
                        <span class="coin-badge">${news.coin}</span>
                        <div class="news-title">${news.title}</div>
                        <div class="news-meta"><span class="news-source">${news.source}</span><span class="news-date">• ${news.date}</span></div>
                    </a>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    async function fetchNews() {
        const fullUrl = PROXY_URL + encodeURIComponent(RSS_URL);
        const response = await fetch(fullUrl, { signal: AbortSignal.timeout(12000) });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        if (!text || text.length < 100) throw new Error('Empty response');
        return text;
    }

    async function loadNews() {
        const btn = document.getElementById('btnReload');
        btn.classList.add('loading');
        document.getElementById('updatedTime').innerHTML = `<span>${getMalaysiaTime()}</span>`;
        showSkeleton();
        try {
            const xmlText = await fetchNews();
            const newsList = parseRSS(xmlText);
            renderNews(newsList);
        } catch (err) {
            console.error(err);
            renderFallback();
        } finally {
            btn.classList.remove('loading');
        }
    }

    // Initialize
    loadNews();
